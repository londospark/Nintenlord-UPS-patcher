name: Build

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            runtime: win-x64
            artifact-name: nups-windows-x64
          - os: windows-latest
            runtime: win-arm64
            artifact-name: nups-windows-arm64

          # macOS
          - os: macos-13
            runtime: osx-x64
            artifact-name: nups-macos-x64
          - os: macos-latest
            runtime: osx-arm64
            artifact-name: nups-macos-arm64

          # Linux - use ubuntu-20.04 for older glibc (SteamOS compatibility)
          - os: ubuntu-20.04
            runtime: linux-x64
            artifact-name: nups-linux-x64
          - os: ubuntu-20.04
            runtime: linux-arm64
            artifact-name: nups-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore "Nintenlord UPS patcher.Avalonia/Nintenlord UPS patcher.Avalonia.csproj"

    - name: Install Linux dependencies (for Avalonia)
      if: startsWith(matrix.runtime, 'linux')
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libice-dev \
          libsm-dev \
          libfontconfig1-dev

    - name: Publish AOT
      run: |
        dotnet publish "Nintenlord UPS patcher.Avalonia/Nintenlord UPS patcher.Avalonia.csproj" \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained \
          -p:PublishAot=true \
          -p:PublishSingleFile=false \
          -p:StripSymbols=true \
          -o publish/${{ matrix.runtime }}

    - name: Bundle Linux dependencies (for SteamOS)
      if: startsWith(matrix.runtime, 'linux')
      run: |
        cd publish/${{ matrix.runtime }}

        # Create a wrapper script that sets LD_LIBRARY_PATH
        cat > "Nintenlord UPS patcher.Avalonia.sh" << 'EOF'
        #!/bin/bash
        DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        export LD_LIBRARY_PATH="$DIR:$LD_LIBRARY_PATH"
        exec "$DIR/Nintenlord UPS patcher.Avalonia" "$@"
        EOF
        chmod +x "Nintenlord UPS patcher.Avalonia.sh"

        # Copy required shared libraries that might not be on SteamOS
        mkdir -p lib

        # Find and copy dependencies (excluding system-critical ones)
        for lib in $(ldd "Nintenlord UPS patcher.Avalonia" | grep "=> /" | awk '{print $3}' | grep -v "^/lib64" | grep -v "^/lib/x86_64"); do
          if [ -f "$lib" ]; then
            cp "$lib" . 2>/dev/null || true
          fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: publish/${{ matrix.runtime }}/*
        if-no-files-found: error

  build-linux-appimage:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - runtime: linux-x64
            arch: x86_64
          - runtime: linux-arm64
            arch: aarch64

    steps:
    - uses: actions/checkout@v4

    - name: Download Linux build
      uses: actions/download-artifact@v4
      with:
        name: nups-${{ matrix.runtime }}
        path: build

    - name: Install AppImage tools
      run: |
        wget -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
        chmod +x appimagetool

    - name: Create AppImage structure
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

        # Copy executable
        cp -r build/* AppDir/usr/bin/
        chmod +x AppDir/usr/bin/Nintenlord\ UPS\ patcher.Avalonia || true

        # Create desktop file
        cat > AppDir/usr/share/applications/nups.desktop << 'EOF'
        [Desktop Entry]
        Type=Application
        Name=Nintenlord UPS Patcher
        Exec=Nintenlord UPS patcher.Avalonia
        Icon=nups
        Categories=Utility;
        Terminal=false
        EOF

        # Create AppRun
        cat > AppDir/AppRun << 'EOF'
        #!/bin/bash
        SELF=$(readlink -f "$0")
        HERE=${SELF%/*}
        export PATH="${HERE}/usr/bin:${PATH}"
        exec "${HERE}/usr/bin/Nintenlord UPS patcher.Avalonia" "$@"
        EOF
        chmod +x AppDir/AppRun

        # Copy icon if exists
        if [ -f "Nintenlord UPS patcher/NUPS icon.ico" ]; then
          cp "Nintenlord UPS patcher/NUPS icon.ico" AppDir/usr/share/icons/hicolor/256x256/apps/nups.ico
        fi

        ln -s usr/share/applications/nups.desktop AppDir/nups.desktop
        if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/nups.ico ]; then
          ln -s usr/share/icons/hicolor/256x256/apps/nups.ico AppDir/nups.ico
        fi

    - name: Build AppImage
      run: |
        ARCH=${{ matrix.arch }} ./appimagetool AppDir Nintenlord-UPS-Patcher-${{ matrix.runtime }}.AppImage

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: nups-appimage-${{ matrix.runtime }}
        path: Nintenlord-UPS-Patcher-${{ matrix.runtime }}.AppImage
        if-no-files-found: error

  build-macos-universal:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Download macOS builds
      uses: actions/download-artifact@v4
      with:
        pattern: nups-macos-*
        path: builds

    - name: Create universal .app bundle
      run: |
        # Create .app structure
        mkdir -p "NUPS.app/Contents/MacOS"
        mkdir -p "NUPS.app/Contents/Resources"

        # Create Info.plist
        cat > "NUPS.app/Contents/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>NUPS</string>
            <key>CFBundleIdentifier</key>
            <string>com.londospark.nups</string>
            <key>CFBundleName</key>
            <string>Nintenlord UPS Patcher</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
        </dict>
        </plist>
        EOF

        # Copy icon if exists
        if [ -f "Nintenlord UPS patcher/NUPS icon.ico" ]; then
          cp "Nintenlord UPS patcher/NUPS icon.ico" "NUPS.app/Contents/Resources/NUPS.ico"
        fi

        # Create launcher script that detects architecture
        cat > "NUPS.app/Contents/MacOS/NUPS" << 'EOF'
        #!/bin/bash
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        ARCH=$(uname -m)

        if [ "$ARCH" = "arm64" ]; then
          exec "$DIR/NUPS-arm64" "$@"
        else
          exec "$DIR/NUPS-x64" "$@"
        fi
        EOF
        chmod +x "NUPS.app/Contents/MacOS/NUPS"

        # Copy both architecture binaries
        cp -r builds/nups-macos-arm64/* "NUPS.app/Contents/MacOS/"
        mv "NUPS.app/Contents/MacOS/Nintenlord UPS patcher.Avalonia" "NUPS.app/Contents/MacOS/NUPS-arm64"

        cp -r builds/nups-macos-x64/* "NUPS.app/Contents/MacOS/"
        mv "NUPS.app/Contents/MacOS/Nintenlord UPS patcher.Avalonia" "NUPS.app/Contents/MacOS/NUPS-x64"

        # Make binaries executable
        chmod +x "NUPS.app/Contents/MacOS/NUPS-arm64"
        chmod +x "NUPS.app/Contents/MacOS/NUPS-x64"

        # Create DMG
        hdiutil create -volname "NUPS" -srcfolder "NUPS.app" -ov -format UDZO "Nintenlord-UPS-Patcher-macOS-universal.dmg"

    - name: Upload macOS Universal App
      uses: actions/upload-artifact@v4
      with:
        name: nups-macos-universal
        path: Nintenlord-UPS-Patcher-macOS-universal.dmg
        if-no-files-found: error

  build-macos-universal:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Download macOS builds
      uses: actions/download-artifact@v4
      with:
        pattern: nups-macos-*
        path: builds

    - name: Create universal .app bundle
      run: |
        # Create .app structure
        mkdir -p "NUPS.app/Contents/MacOS"
        mkdir -p "NUPS.app/Contents/Resources"

        # Create Info.plist
        cat > "NUPS.app/Contents/Info.plist" << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>NUPS</string>
            <key>CFBundleIdentifier</key>
            <string>com.londospark.nups</string>
            <key>CFBundleName</key>
            <string>Nintenlord UPS Patcher</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
        </dict>
        </plist>
        EOF

        # Copy icon if exists
        if [ -f "Nintenlord UPS patcher/NUPS icon.ico" ]; then
          cp "Nintenlord UPS patcher/NUPS icon.ico" "NUPS.app/Contents/Resources/NUPS.ico"
        fi

        # Create launcher script that detects architecture
        cat > "NUPS.app/Contents/MacOS/NUPS" << 'EOF'
        #!/bin/bash
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        ARCH=$(uname -m)

        if [ "$ARCH" = "arm64" ]; then
          exec "$DIR/NUPS-arm64" "$@"
        else
          exec "$DIR/NUPS-x64" "$@"
        fi
        EOF
        chmod +x "NUPS.app/Contents/MacOS/NUPS"

        # Copy both architecture binaries
        cp -r builds/nups-macos-arm64/* "NUPS.app/Contents/MacOS/"
        mv "NUPS.app/Contents/MacOS/Nintenlord UPS patcher.Avalonia" "NUPS.app/Contents/MacOS/NUPS-arm64"

        cp -r builds/nups-macos-x64/* "NUPS.app/Contents/MacOS/"
        mv "NUPS.app/Contents/MacOS/Nintenlord UPS patcher.Avalonia" "NUPS.app/Contents/MacOS/NUPS-x64"

        # Make binaries executable
        chmod +x "NUPS.app/Contents/MacOS/NUPS-arm64"
        chmod +x "NUPS.app/Contents/MacOS/NUPS-x64"

        # Create DMG
        hdiutil create -volname "NUPS" -srcfolder "NUPS.app" -ov -format UDZO "Nintenlord-UPS-Patcher-macOS-universal.dmg"

    - name: Upload macOS Universal App
      uses: actions/upload-artifact@v4
      with:
        name: nups-macos-universal
        path: Nintenlord-UPS-Patcher-macOS-universal.dmg
        if-no-files-found: error
