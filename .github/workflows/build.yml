name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Run tests with coverage
      run: |
        dotnet test tests/Nintenlord.Hacking.Core.Tests/Nintenlord.Hacking.Core.Tests.csproj \
          -c Release \
          --collect:"XPlat Code Coverage" \
          --results-directory coverage

    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5
      with:
        reports: 'coverage/**/coverage.cobertura.xml'
        targetdir: 'coverage/report'
        reporttypes: 'Html;MarkdownSummaryGithub'

    - name: Write coverage summary
      run: cat coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage/report
        if-no-files-found: error

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            runtime: win-x64
            artifact-name: nups-windows-x64
          - os: windows-latest
            runtime: win-arm64
            artifact-name: nups-windows-arm64

          # macOS
          - os: macos-15-intel
            runtime: osx-x64
            artifact-name: nups-macos-x64
          - os: macos-latest
            runtime: osx-arm64
            artifact-name: nups-macos-arm64

          # Linux - ubuntu-22.04 (glibc 2.35, compatible with SteamOS 3+ and modern distros)
          - os: ubuntu-22.04
            runtime: linux-x64
            artifact-name: nups-linux-x64
          - os: ubuntu-22.04-arm
            runtime: linux-arm64
            artifact-name: nups-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore "Nintenlord UPS patcher.Avalonia/Nintenlord UPS patcher.Avalonia.csproj"

    - name: Install Linux dependencies (for Avalonia)
      if: startsWith(matrix.runtime, 'linux')
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libice-dev \
          libsm-dev \
          libfontconfig1-dev

    - name: Publish AOT
      shell: bash
      run: |
        dotnet publish "Nintenlord UPS patcher.Avalonia/Nintenlord UPS patcher.Avalonia.csproj" \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained \
          -p:PublishAot=true \
          -p:PublishSingleFile=false \
          -p:StripSymbols=true \
          -o publish/${{ matrix.runtime }}

    - name: Bundle Linux dependencies (for SteamOS)
      if: startsWith(matrix.runtime, 'linux')
      run: bash .github/scripts/bundle-linux-deps.sh "publish/${{ matrix.runtime }}"

    - name: Create portable archive (Windows)
      if: runner.os == 'Windows'
      run: |
        cd publish/${{ matrix.runtime }}
        7z a ../../Nintenlord-UPS-Patcher-Portable-${{ matrix.runtime }}.zip *

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}
        path: publish/${{ matrix.runtime }}/*
        if-no-files-found: error

  build-windows-msi:
    runs-on: windows-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            artifact-name: nups-windows-x64
          - runtime: win-arm64
            artifact-name: nups-windows-arm64

    steps:
    - uses: actions/checkout@v6

    - name: Download Windows build
      uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.artifact-name }}
        path: publish/${{ matrix.runtime }}

    - name: Extract portable archive
      run: |
        cd publish/${{ matrix.runtime }}
        7z x Nintenlord-UPS-Patcher-Portable-${{ matrix.runtime }}.zip
        Remove-Item Nintenlord-UPS-Patcher-Portable-${{ matrix.runtime }}.zip

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Create MSI installer
      run: |
        & ".github\scripts\create-msi.ps1" -Runtime ${{ matrix.runtime }} -Version "1.0.0.0"

    - name: Upload MSI installer
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}-msi
        path: Nintenlord-UPS-Patcher-Setup-${{ matrix.runtime }}.msi
        if-no-files-found: error

  build-linux-appimage:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - runtime: linux-x64
            arch: x86_64
          - runtime: linux-arm64
            arch: aarch64

    steps:
    - uses: actions/checkout@v6

    - name: Install squashfs-tools
      run: sudo apt-get install -y squashfs-tools

    - name: Download Linux build
      uses: actions/download-artifact@v8
      with:
        name: nups-${{ matrix.runtime }}
        path: build

    - name: Create AppImage
      run: bash .github/scripts/create-appimage.sh ${{ matrix.runtime }} ${{ matrix.arch }} build

    - name: Upload AppImage
      uses: actions/upload-artifact@v7
      with:
        name: nups-appimage-${{ matrix.runtime }}
        path: Nintenlord-UPS-Patcher-${{ matrix.runtime }}.AppImage
        if-no-files-found: error


  build-macos-universal:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Download macOS builds
      uses: actions/download-artifact@v8
      with:
        pattern: nups-macos-*
        path: builds

    - name: Create universal .app bundle
      run: bash .github/scripts/create-macos-bundle.sh builds/nups-macos-arm64 builds/nups-macos-x64

    - name: Upload macOS Universal App
      uses: actions/upload-artifact@v7
      with:
        name: nups-macos-universal
        path: Nintenlord-UPS-Patcher-macOS-universal.dmg
        if-no-files-found: error
