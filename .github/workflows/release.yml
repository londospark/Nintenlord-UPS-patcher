name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            runtime: win-x64
            artifact-name: nups-windows-x64
          - os: windows-latest
            runtime: win-arm64
            artifact-name: nups-windows-arm64

          # macOS
          - os: macos-13
            runtime: osx-x64
            artifact-name: nups-macos-x64
          - os: macos-latest
            runtime: osx-arm64
            artifact-name: nups-macos-arm64

          # Linux - use ubuntu-20.04 for older glibc (SteamOS compatibility)
          - os: ubuntu-20.04
            runtime: linux-x64
            artifact-name: nups-linux-x64
          - os: ubuntu-20.04
            runtime: linux-arm64
            artifact-name: nups-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore "Nintenlord UPS patcher.Avalonia/Nintenlord UPS patcher.Avalonia.csproj"

    - name: Install Linux dependencies (for Avalonia)
      if: startsWith(matrix.runtime, 'linux')
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libice-dev \
          libsm-dev \
          libfontconfig1-dev

    - name: Publish AOT
      run: |
        dotnet publish "Nintenlord UPS patcher.Avalonia/Nintenlord UPS patcher.Avalonia.csproj" \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained \
          -p:PublishAot=true \
          -p:PublishSingleFile=false \
          -p:StripSymbols=true \
          -o publish/${{ matrix.runtime }}

    - name: Bundle Linux dependencies (for SteamOS)
      if: startsWith(matrix.runtime, 'linux')
      run: bash .github/scripts/bundle-linux-deps.sh "publish/${{ matrix.runtime }}"

    - name: Create Windows installer
      if: runner.os == 'Windows'
      run: |
        # Download and install Inno Setup
        choco install innosetup -y

        # Determine architecture settings for Inno Setup
        if ("${{ matrix.runtime }}" -eq "win-x64") {
          $archAllowed = "x64compatible"
          $arch64Bit = "x64compatible"
        } else {
          $archAllowed = "arm64"
          $arch64Bit = "arm64"
        }

        # Compile installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
          /DMyAppVersion="${{ github.ref_name }}" `
          /DRUNTIME="${{ matrix.runtime }}" `
          /DARCH_ALLOWED="$archAllowed" `
          /DARCH_64BIT="$arch64Bit" `
          ".github\installers\windows-installer.iss"

        # Move installer to root
        Move-Item ".github\installers\Nintenlord-UPS-Patcher-Setup-${{ matrix.runtime }}.exe" "."

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      run: |
        cd publish/${{ matrix.runtime }}
        7z a ../../Nintenlord-UPS-Patcher-${{ matrix.runtime }}.zip *

    - name: Create archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd publish/${{ matrix.runtime }}
        tar -czf ../../Nintenlord-UPS-Patcher-${{ matrix.runtime }}.tar.gz *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: |
          Nintenlord-UPS-Patcher-${{ matrix.runtime }}.zip
          Nintenlord-UPS-Patcher-${{ matrix.runtime }}.tar.gz
          Nintenlord-UPS-Patcher-Setup-${{ matrix.runtime }}.exe
        if-no-files-found: ignore

  build-linux-appimage:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        include:
          - runtime: linux-x64
            arch: x86_64
          - runtime: linux-arm64
            arch: aarch64

    steps:
    - uses: actions/checkout@v4

    - name: Download Linux build
      uses: actions/download-artifact@v4
      with:
        name: nups-${{ matrix.runtime }}
        path: build

    - name: Extract archive
      run: |
        cd build
        tar -xzf Nintenlord-UPS-Patcher-${{ matrix.runtime }}.tar.gz
        rm Nintenlord-UPS-Patcher-${{ matrix.runtime }}.tar.gz

    - name: Create AppImage
      run: bash .github/scripts/create-appimage.sh ${{ matrix.runtime }} ${{ matrix.arch }} build

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: nups-appimage-${{ matrix.runtime }}
        path: Nintenlord-UPS-Patcher-${{ matrix.runtime }}.AppImage
        if-no-files-found: error

  build-macos-universal:
    runs-on: macos-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Download macOS builds
      uses: actions/download-artifact@v4
      with:
        pattern: nups-macos-*
        path: builds

    - name: Extract archives
      run: |
        cd builds/nups-macos-arm64
        tar -xzf Nintenlord-UPS-Patcher-osx-arm64.tar.gz
        rm Nintenlord-UPS-Patcher-osx-arm64.tar.gz
        cd ../nups-macos-x64
        tar -xzf Nintenlord-UPS-Patcher-osx-x64.tar.gz
        rm Nintenlord-UPS-Patcher-osx-x64.tar.gz

    - name: Create universal .app bundle
      run: bash .github/scripts/create-macos-bundle.sh builds/nups-macos-arm64 builds/nups-macos-x64

    - name: Upload macOS Universal App
      uses: actions/upload-artifact@v4
      with:
        name: nups-macos-universal
        path: Nintenlord-UPS-Patcher-macOS-universal.dmg
        if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs: [build, build-linux-appimage, build-macos-universal]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*.zip
          artifacts/**/*.tar.gz
          artifacts/**/*.AppImage
          artifacts/**/*.dmg
          artifacts/**/*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
